name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        project: [ junit4, junit5, junit5-seljup, testng ]
        build-tool: [ mvn, gradle ]
        os: [ ubuntu-latest ]
        java: [ 17 ]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout GitHub repo
      uses: actions/checkout@v7

    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ matrix.java }}
        cache: ${{ matrix.build-tool == 'mvn' && 'maven' || 'gradle' }}

    - name: Prepare browser environment on Linux
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        if sysctl kernel.apparmor_restrict_unprivileged_userns \
            > /dev/null 2>&1; then
          sudo sysctl -w \
            kernel.apparmor_restrict_unprivileged_userns=0
        fi

        echo "Installed browser versions:"

        if command -v google-chrome > /dev/null 2>&1; then
          google-chrome --version
        fi

        if command -v microsoft-edge > /dev/null 2>&1; then
          microsoft-edge --version
        fi

        if command -v firefox > /dev/null 2>&1; then
          firefox --version
        fi

    - name: Run ${{ matrix.project }} tests with Maven
      if: matrix.build-tool == 'mvn'
      uses: nick-invision/retry@v4.0.0
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: |
          cd selenium-webdriver-${{ matrix.project }}
          xvfb-run \
            --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac" \
            mvn -B test

    - name: Run ${{ matrix.project }} tests with Gradle
      if: matrix.build-tool == 'gradle'
      uses: nick-invision/retry@v4.0.0
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: |
          cd selenium-webdriver-${{ matrix.project }}
          chmod +x gradlew
          xvfb-run \
            --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac" \
            ./gradlew test