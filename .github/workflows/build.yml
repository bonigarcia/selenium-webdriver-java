name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  tests:
    strategy:
      matrix:
        project: [ junit4, junit5, junit5-seljup, testng ]
        build-tool: [ mvn, gradle ]
        os: [ ubuntu-latest ]
        java: [ 17 ]
    runs-on: ${{ matrix.os }}
    env:
      DISPLAY: :99

    steps:
    - name: Checkout GitHub repo
      uses: actions/checkout@v7
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Start Xvfb on Linux
      if: matrix.os == 'ubuntu-latest'
      run: Xvfb $DISPLAY &
    - name: Install Edge dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-6 \
          libx11-xcb1 \
          libxcomposite1 \
          libxcursor1 \
          libxdamage1 \
          libxext6 \
          libxfixes3 \
          libxi6 \
          libxrandr2 \
          libxrender1 \
          libxss1 \
          libxtst6 \
          libnss3 \
          libindicator7 \
          libgbm1 \
          libpangocairo-1.0-0
    - name: Run ${{ matrix.project }} tests with Maven
      if: matrix.build-tool == 'mvn'
      uses: nick-invision/retry@v4.0.0
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: |
          cd selenium-webdriver-${{ matrix.project }}
          mvn test
    - name: Run ${{ matrix.project }} tests with Gradle
      if: matrix.build-tool == 'gradle'
      uses: nick-invision/retry@v4.0.0
      with:
        timeout_minutes: 30
        max_attempts: 3
        command: |
          cd selenium-webdriver-${{ matrix.project }}
          ./gradlew test
